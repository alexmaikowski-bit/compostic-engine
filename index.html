<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Compostic — Engine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Nunito:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400;1,9..144,600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>
<style>
  :root{
    --brand:#3E7B54; --brand-deep:#2E5C3F; --brand-light:#E4EFE2; --brand-mid:#4E9E8A;
    --magenta:#3E7B54; --purple:#4E9E8A; --purple-deep:#2E5C3F; --orange:#E8944A;
    --accent:#E8944A; --accent-soft:#F3C79B; --accent-deep:#B5641E; --accent-pale:#FBEBD9;
    --cream:#F4F1E9; --cream-deep:#E9E4D6; --paper:#FFFFFF;
    --ink:#25291F; --ink-soft:#5F6657; --border:#E4E0D2;
    --coral:#E8944A; --teal:#4E9E8A; --pink:#4E9E8A; --green:#3E7B54; --green-deep:#2E5C3F;
    --hi:#3E7B54; --warn:#C77A2E;
    --shadow:0 2px 10px rgba(37,41,31,.08); --shadow-lg:0 16px 46px rgba(37,41,31,.18);
    --hard:4px 4px 0 var(--brand-deep); --r:18px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:'Nunito',system-ui,sans-serif;background:var(--cream);color:var(--ink);-webkit-font-smoothing:antialiased;overflow-x:hidden}
  h1,h2,h3,h4{font-family:'Quicksand','Quicksand','Nunito',sans-serif}
  a{color:inherit}
  ::selection{background:var(--accent);color:var(--brand-deep)}

  .app{display:grid;grid-template-columns:214px 1fr;min-height:100vh}

  /* Sidebar */
  .side{background:var(--brand-deep);color:#fff;padding:20px 14px;display:flex;flex-direction:column;gap:5px;position:sticky;top:0;height:100vh;overflow-y:auto}
  .logo{margin-bottom:16px}
  .logo-blocks{display:flex;gap:3px;margin-bottom:7px}
  .blk{width:27px;height:27px;border-radius:6px;display:grid;place-items:center;font-family:'Quicksand';font-weight:900;font-size:15px;color:var(--brand-deep);box-shadow:0 2px 0 rgba(0,0,0,.15)}
  .logo-name{font-family:'Quicksand';font-weight:900;font-size:18px;letter-spacing:.01em;line-height:1;color:#fff}
  .logo-sub{font-size:10px;color:var(--accent);font-style:italic;font-family:'Fraunces';margin-top:3px}
  .nav-item{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:11px;cursor:pointer;font-size:13.5px;font-weight:700;color:#C9BEE8;transition:.15s;border:none;background:none;text-align:left;width:100%;font-family:'Nunito'}
  .nav-item:hover{background:rgba(255,255,255,.09);color:#fff}
  .nav-item.on{background:var(--brand);color:#fff}
  .nav-item .ico{font-size:15px}
  .nav-new{font-size:8px;background:var(--accent);color:var(--brand-deep);padding:1px 6px;border-radius:20px;margin-left:auto;letter-spacing:.04em;font-weight:800}
  .nav-wip{font-size:8px;background:rgba(255,255,255,.15);padding:1px 6px;border-radius:20px;margin-left:auto;letter-spacing:.05em}
  .side-spacer{flex:1;min-height:14px}
  .btn-chunky{background:var(--accent-soft);color:var(--brand-deep);border:2px solid var(--brand-deep);padding:11px;border-radius:14px;font-weight:800;font-size:13px;cursor:pointer;font-family:'Quicksand';display:flex;align-items:center;gap:7px;justify-content:center;box-shadow:3px 3px 0 var(--brand-deep);transition:.12s}
  .btn-chunky:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 var(--brand-deep)}
  .btn-chunky:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--brand-deep)}
  .howlink{background:none;border:none;color:#9385C4;font-size:11px;cursor:pointer;padding:8px;text-align:center;font-weight:700}
  .howlink:hover{color:#fff}

  /* Main */
  .main{padding:0 0 60px;min-width:0}
  .page-head{padding:26px 34px 12px;display:flex;align-items:flex-start;justify-content:space-between;gap:20px;flex-wrap:wrap}
  .page-head h1{font-size:32px;font-weight:900;margin:0 0 4px;letter-spacing:-.01em;color:var(--brand)}
  .page-head .dek{font-family:'Fraunces';font-style:italic;font-size:15px;color:var(--ink-soft);margin:0;max-width:660px;line-height:1.4}
  .pill{display:inline-flex;align-items:center;gap:6px;background:var(--accent-pale);border:1.5px solid var(--brand);padding:6px 13px;border-radius:30px;font-size:11.5px;font-weight:800;white-space:nowrap;color:var(--brand)}
  .live-dot{width:7px;height:7px;border-radius:50%;background:var(--hi);animation:pulse 2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(58,167,109,.5)}70%{box-shadow:0 0 0 7px rgba(58,167,109,0)}100%{box-shadow:0 0 0 0 rgba(58,167,109,0)}}

  .ticker{background:var(--brand-deep);color:#fff;overflow:hidden;white-space:nowrap;padding:9px 0;margin:0 0 18px}
  .ticker-track{display:inline-block;animation:scroll 44s linear infinite}
  .ticker-track span{margin:0 15px;font-size:11.5px;font-family:'JetBrains Mono'}
  .tdot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:7px;vertical-align:middle}
  @keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

  .wrap{padding:0 34px}
  .section-eyebrow{font-family:'JetBrains Mono';font-size:10.5px;letter-spacing:.14em;color:var(--brand);text-transform:uppercase;margin:26px 0 12px;font-weight:700}

  .subtabs{display:flex;gap:6px;flex-wrap:wrap;margin:4px 0 20px}
  .subtab{background:var(--paper);border:1.5px solid var(--border);padding:8px 14px;border-radius:30px;font-size:12.5px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:7px;color:var(--ink-soft);transition:.15s;font-family:'Nunito'}
  .subtab:hover{border-color:var(--brand)}
  .subtab.on{background:var(--brand);color:#fff;border-color:var(--brand)}
  .subtab .badge{background:rgba(0,0,0,.12);border-radius:20px;padding:0 6px;font-size:10px;font-weight:800}
  .subtab.on .badge{background:rgba(255,255,255,.25)}

  .grid{display:grid;gap:14px}
  .grid-2{grid-template-columns:repeat(2,1fr)}
  .grid-3{grid-template-columns:repeat(3,1fr)}

  .card{background:var(--paper);border:1px solid var(--border);border-radius:var(--r);padding:16px 16px 14px;position:relative;box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column}
  .card .rail{position:absolute;left:0;top:0;bottom:0;width:5px}
  .card-head{display:flex;align-items:center;gap:10px;margin-bottom:9px}
  .glyph{width:34px;height:34px;border-radius:11px;display:grid;place-items:center;font-size:17px;flex-shrink:0}
  .eyebrow{font-family:'JetBrains Mono';font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);font-weight:700}
  .vbadge{margin-left:auto;font-size:9.5px;font-weight:800;padding:3px 8px;border-radius:20px;font-family:'JetBrains Mono';letter-spacing:.03em}
  .vhigh{background:#FDECEA;color:#C0392B}.vmed{background:#FDF3DA;color:#B9791B}.vlow{background:#EFEDE7;color:#8A8175}
  .card h3{font-family:'Fraunces';font-size:16px;font-weight:600;margin:0 0 7px;line-height:1.28}
  .card p.detail{font-size:13px;color:var(--ink-soft);line-height:1.5;margin:0 0 10px}
  .playbox{background:var(--brand-light);border-radius:12px;padding:10px 12px;margin:0 0 10px;font-size:12.5px;line-height:1.45}
  .playbox .plabel{font-family:'JetBrains Mono';font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--brand);font-weight:700;display:block;margin-bottom:3px}
  .chips{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-top:auto}
  .chip{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:20px;background:var(--cream-deep);color:var(--ink-soft)}
  .chip.brand{background:var(--brand-light);color:var(--brand)}
  .chip.plat{background:var(--accent-pale);color:var(--accent-deep)}
  .srcchips{display:flex;gap:5px;flex-wrap:wrap;margin-top:9px}
  .src{font-family:'JetBrains Mono';font-size:9.5px;color:var(--ink-soft);background:var(--cream);border:1px solid var(--border);padding:2px 7px;border-radius:6px;text-decoration:none}
  .src:hover{border-color:var(--brand);color:var(--brand)}
  .dropbtn{margin-left:auto;background:var(--accent-soft);color:var(--brand-deep);border:1.5px solid var(--brand-deep);font-size:10.5px;font-weight:800;padding:4px 11px;border-radius:20px;cursor:pointer;font-family:'Quicksand';box-shadow:2px 2px 0 var(--brand-deep)}
  .dropbtn:hover{transform:translate(-1px,-1px)}
  .brief-link{display:flex;align-items:center;gap:6px;background:var(--accent-pale);border:1px solid var(--accent-deep);color:var(--brand-deep);border-radius:10px;padding:8px 11px;font-size:11px;font-weight:800;cursor:pointer;margin-top:10px;font-family:'Nunito';text-align:left;line-height:1.35;width:100%}
  .brief-link:hover{background:var(--accent-soft)}
  .brief-link .bl-arrow{font-family:'JetBrains Mono';flex-shrink:0}
  .pips{display:flex;gap:5px;flex-wrap:wrap;margin-top:9px}
  .pip{font-size:10px;font-weight:800;padding:3px 9px;border-radius:20px;letter-spacing:.01em;display:inline-flex;align-items:center;gap:3px}
  .read-hint{background:var(--brand-light);border:1px solid #DBCEF4;border-radius:13px;padding:11px 15px;font-size:12px;line-height:1.55;color:var(--ink-soft);margin-bottom:16px;display:flex;gap:9px;align-items:flex-start}
  .read-hint b{color:var(--brand);font-weight:800}
  .read-hint .rh-ico{font-size:15px;flex-shrink:0;line-height:1.3}
  .rh-list{margin:6px 0 0;padding-left:17px}
  .rh-list li{margin:3px 0;line-height:1.45}
  .drove-wrap{margin-top:11px;padding-top:11px;border-top:1px dashed var(--border)}
  .drove-lbl{display:block;font-family:'JetBrains Mono';font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);font-weight:800;margin-bottom:7px}
  .drove-chips{display:flex;flex-direction:column;gap:6px}
  .drove-chip{text-align:left;background:var(--paper);border:1px solid var(--border);border-radius:10px;padding:8px 11px;font-size:12px;line-height:1.35;color:var(--ink);font-family:'Nunito';cursor:pointer;transition:.12s;font-weight:600}
  .drove-chip:hover{border-color:var(--brand);background:var(--brand-light);color:var(--brand)}
  .drove-chip.static{cursor:default;color:var(--ink-soft);font-weight:600}
  .drove-chip.static:hover{border-color:var(--border);background:var(--paper);color:var(--ink-soft)}
  .card.flash{animation:cardflash 1.7s ease-out}
  @keyframes cardflash{0%{box-shadow:0 0 0 3px var(--accent)}18%{box-shadow:0 0 0 3px var(--accent)}100%{box-shadow:var(--shadow)}}
  .step-cell{transition:background .4s ease,box-shadow .4s ease}
  .step-cell.on{box-shadow:inset 0 0 0 2px var(--accent)}
  .step-cell.you.on{box-shadow:inset 0 0 0 2px var(--accent-soft)}
  .lnow{color:var(--green);font-weight:800;white-space:nowrap}
  .ltail{color:var(--accent-deep);font-weight:800;white-space:nowrap}
  .cast-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
  .cast-mini{background:var(--paper);border:1px solid var(--border);border-radius:14px;padding:12px 13px;display:flex;gap:10px;align-items:flex-start;box-shadow:var(--shadow)}
  .cast-mini .cem{font-size:27px;line-height:1;flex-shrink:0}
  .cast-mini .crl{font-size:9.5px;color:var(--brand);font-weight:800;text-transform:uppercase;letter-spacing:.03em;margin-bottom:2px}
  .cast-mini .cnm{font-family:'Quicksand';font-weight:800;font-size:14px;line-height:1}
  .cast-mini .cln{font-family:'Fraunces';font-style:italic;font-size:11px;color:var(--ink-soft);line-height:1.35;margin-top:4px}
  @media(max-width:860px){.cast-strip{grid-template-columns:1fr 1fr}}
  .cardfoot{display:flex;align-items:flex-end;gap:8px;margin-top:11px}
  .cardfoot .srcchips{flex:1;margin-top:0}
  .ch-right{margin-left:auto;display:flex;align-items:center;gap:6px}
  .ch-right .vbadge{margin-left:0}
  .fresh-chip{font-size:8.5px;font-weight:800;padding:2px 8px;border-radius:20px;font-family:'JetBrains Mono';letter-spacing:.02em;display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
  .fc-fresh{background:#E7F5EC;color:#2E8B57}
  .fc-comp{background:var(--accent-pale);color:var(--accent-deep)}
  .dir-badge{font-size:10px;font-weight:800;padding:3px 9px;border-radius:20px;font-family:'JetBrains Mono'}
  .dir-hot{background:#FDECEA;color:#C0392B}.dir-cool{background:#E7F5EC;color:#2E8B57}.dir-flat{background:#EFEDE7;color:#8A8175}

  .mom-cols{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
  .mom-col{background:var(--paper);border:1px solid var(--border);border-radius:var(--r);padding:16px;box-shadow:var(--shadow)}
  .mom-col h4{font-size:15px;margin:0 0 12px;display:flex;align-items:center;gap:7px;color:var(--brand)}
  .mom-item{display:flex;gap:9px;padding:9px 0;border-bottom:1px dashed var(--border);font-size:12.5px;line-height:1.4}
  .mom-item:last-child{border-bottom:none}
  .mchip{font-size:8.5px;font-weight:800;padding:2px 7px;border-radius:20px;height:fit-content;white-space:nowrap;font-family:'JetBrains Mono'}
  .mup{background:#E7F5EC;color:#2E8B57}.mdown{background:#FDF3DA;color:#B9791B}

  /* Hero band */
  .ride-hero{background:linear-gradient(120deg,var(--brand-deep),var(--brand) 62%,var(--brand-mid));color:#fff;border-radius:20px;padding:22px 24px;margin-bottom:20px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;position:relative;overflow:hidden}
  .ride-count{background:var(--accent);color:var(--brand-deep);font-family:'Quicksand';font-weight:900;font-size:15px;padding:8px 15px;border-radius:30px;display:flex;align-items:center;gap:7px;white-space:nowrap}
  .ride-hero h2{font-size:20px;margin:0 0 3px;font-weight:900}
  .ride-hero p{margin:0;font-size:12.5px;color:#E4DBF7}
  .ride-meta{margin-left:auto;text-align:right;font-size:11px;color:#CFC2EE;font-family:'JetBrains Mono'}

  .pillar-head{display:flex;align-items:center;gap:9px;margin:22px 0 12px}
  .pillar-sw{width:16px;height:16px;border-radius:6px}
  .pillar-head h3{font-size:18px;font-weight:800;margin:0;color:var(--brand)}
  .pillar-head .ct{font-size:11px;color:var(--ink-soft);font-family:'JetBrains Mono';margin-left:auto}

  .brief{background:var(--paper);border:1px solid var(--border);border-radius:var(--r);padding:14px 14px 12px;cursor:pointer;position:relative;overflow:hidden;box-shadow:var(--shadow);transition:.15s;display:flex;flex-direction:column}
  .brief:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
  .brief .rail{position:absolute;left:0;top:0;bottom:0;width:5px}
  .brief-top{display:flex;align-items:center;gap:8px;margin-bottom:9px}
  .conv{font-size:9.5px;font-weight:800;padding:3px 8px;border-radius:20px;font-family:'JetBrains Mono';cursor:help;position:relative}
  .cHIGH{background:#E7F5EC;color:#2E8B57}.cMEDIUM{background:#FDF3DA;color:#B9791B}.cWATCH{background:#EFEDE7;color:#8A8175}
  .brief h4{font-family:'Fraunces';font-size:14px;font-weight:600;line-height:1.32;margin:0 0 11px;flex:1}
  .brief-bottom{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .nobaby{font-size:9px;font-weight:800;padding:2px 7px;border-radius:20px;background:#E5F6FA;color:var(--teal);font-family:'JetBrains Mono'}
  .anchor-tag{font-size:9px;font-weight:800;padding:2px 7px;border-radius:20px;background:var(--accent-pale);color:var(--accent-deep);font-family:'JetBrains Mono'}
  .tip{position:absolute;bottom:130%;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 12px;border-radius:10px;font-size:11px;font-weight:600;width:214px;z-index:40;box-shadow:var(--shadow-lg);font-family:'Nunito';line-height:1.5;display:none}
  .conv:hover .tip{display:block}
  .tip b{color:var(--accent)}

  /* Casting meter */
  .meter-card{background:var(--paper);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;margin-bottom:18px;box-shadow:var(--shadow)}
  .meter-top{display:flex;align-items:center;gap:10px;margin-bottom:6px}
  .meter-top h3{font-size:16px;margin:0;color:var(--brand)}
  .meter-bar{height:26px;border-radius:14px;background:var(--cream-deep);overflow:hidden;display:flex;margin:12px 0 8px;border:1px solid var(--border)}
  .meter-fill{background:linear-gradient(90deg,var(--teal),#3bbcd8);display:flex;align-items:center;justify-content:flex-end;padding-right:10px;font-size:11px;font-weight:800;color:#fff;font-family:'JetBrains Mono'}
  .meter-rest{flex:1;display:flex;align-items:center;padding-left:10px;font-size:11px;font-weight:700;color:var(--ink-soft);font-family:'JetBrains Mono'}
  .meter-legend{display:flex;gap:18px;font-size:11.5px;color:var(--ink-soft);flex-wrap:wrap}
  .meter-legend b{color:var(--ink)}

  /* Modal */
  .overlay{position:fixed;inset:0;background:rgba(28,20,48,.55);backdrop-filter:blur(3px);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
  .modal{background:var(--cream);border-radius:22px;max-width:680px;width:100%;box-shadow:var(--shadow-lg);position:relative;margin-bottom:40px;animation:rise .25s ease}
  @keyframes rise{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  .modal-hero{background:linear-gradient(120deg,var(--brand-deep),var(--brand));color:#fff;padding:24px 28px;border-radius:22px 22px 0 0;position:relative}
  .x{position:absolute;top:16px;right:18px;background:rgba(255,255,255,.16);border:none;color:#fff;width:32px;height:32px;border-radius:50%;font-size:17px;cursor:pointer;line-height:1}
  .x:hover{background:rgba(255,255,255,.3)}
  .modal-body{padding:22px 28px 28px}
  .m-sec{margin-bottom:20px}
  .m-sec-label{font-family:'JetBrains Mono';font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--brand);font-weight:700;margin-bottom:9px;display:flex;align-items:center;gap:7px}
  .hookrow{background:var(--paper);border:1px solid var(--border);border-radius:12px;padding:11px 13px;margin-bottom:8px;font-size:13.5px;line-height:1.4;position:relative}
  .hookrow.rec{border-color:var(--green);background:#F3FAF0}
  .rec-tag{font-size:8.5px;font-weight:800;color:var(--green);font-family:'JetBrains Mono';letter-spacing:.08em;position:absolute;top:8px;right:11px}
  .intel-row{display:flex;gap:9px;align-items:flex-start;background:var(--paper);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:7px;font-size:12.5px;line-height:1.4}
  .capvar{background:var(--paper);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:9px}
  .capvar .cvlabel{font-family:'JetBrains Mono';font-size:9px;letter-spacing:.08em;color:var(--ink-soft);font-weight:700;text-transform:uppercase;margin-bottom:5px;display:flex;justify-content:space-between}
  .capvar p{margin:0;font-size:13px;line-height:1.5}
  .copybtn{background:var(--cream-deep);border:none;font-size:9px;font-weight:800;padding:2px 8px;border-radius:20px;cursor:pointer;font-family:'JetBrains Mono';color:var(--ink-soft)}
  /* ===== Production Map ===== */
  .prod-lead{font-size:12px;color:var(--ink-soft);margin-bottom:12px}
  .prod-lead b{color:var(--brand)}
  .prod-block{background:var(--paper);border:1px solid var(--border);border-radius:14px;padding:14px 15px;margin-bottom:11px}
  .prod-h{font-family:'Nunito';font-weight:900;font-size:14px;color:var(--brand);display:flex;align-items:center;gap:7px;margin-bottom:11px}
  .prod-h .ph-tags{margin-left:auto;display:flex;gap:6px}
  .prod-meta{font-size:12.5px;line-height:1.5;margin-bottom:8px}
  .prod-meta:last-child{margin-bottom:0}
  .pm-k{display:inline-block;font-family:'JetBrains Mono';font-size:8px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);font-weight:800;background:var(--cream-deep);padding:2px 7px;border-radius:20px;margin-right:8px;vertical-align:middle}
  .prod-tip{background:var(--brand-light);border-radius:10px;padding:9px 12px;font-size:12px;line-height:1.45;color:var(--ink);margin-top:11px}

  .chan-row{display:flex;gap:11px;align-items:flex-start;padding:10px 0;border-bottom:1px dashed var(--border)}

  .chan-badge{font-size:19px;flex-shrink:0;width:34px;height:34px;border-radius:10px;display:grid;place-items:center}
  .chan-fb{background:#E7F0FA}.chan-ig{background:var(--brand-light)}.chan-tt{background:var(--cream-deep)}
  .chan-who{font-family:'JetBrains Mono';font-size:9px;letter-spacing:.04em;font-weight:800;color:var(--brand);text-transform:uppercase;margin-bottom:2px}
  .chan-cut{font-size:12px;line-height:1.45;color:var(--ink)}
  .exp-tag{font-family:'JetBrains Mono';font-size:8px;font-weight:800;letter-spacing:.06em;color:var(--accent-deep);background:var(--accent-pale);border:1px solid var(--accent);padding:2px 8px;border-radius:20px}
  .proven-tag{font-family:'JetBrains Mono';font-size:8px;font-weight:800;letter-spacing:.06em;color:#2E8B57;background:#E7F5EC;border:1px solid var(--green);padding:2px 8px;border-radius:20px}
  .exp-box{background:var(--accent-pale);border:1px solid var(--accent);border-radius:10px;padding:10px 12px;margin-bottom:9px}
  .exp-box .prod-meta:last-child{margin-bottom:0}
  .panel-chan{font-family:'JetBrains Mono';font-size:8px;font-weight:800;letter-spacing:.04em;color:var(--brand);background:var(--brand-light);padding:2px 7px;border-radius:20px}
  /* ===== weekly dashboard modules ===== */
  .chan-strip{display:grid;grid-template-columns:repeat(2,1fr);gap:11px;margin-bottom:20px}
  .chan-pb{background:var(--paper);border:1px solid var(--border);border-radius:14px;padding:14px 15px}
  .chan-pb .cc-top{display:flex;align-items:center;gap:10px;margin-bottom:9px}
  .cc-ic{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;font-size:18px;flex-shrink:0}
  .cc-plat{font-family:'Quicksand';font-weight:800;font-size:15px;color:var(--brand);line-height:1}
  .cc-who{font-family:'JetBrains Mono';font-size:8.5px;font-weight:700;letter-spacing:.04em;color:var(--ink-soft);text-transform:uppercase;margin-top:3px}
  .cc-job{font-size:12px;line-height:1.45;color:var(--ink);margin-bottom:9px}
  .cc-lead{font-family:'JetBrains Mono';font-size:9px;font-weight:800;letter-spacing:.03em;color:var(--accent-deep);background:var(--accent-pale);padding:4px 9px;border-radius:20px;display:inline-block}
  .wk-mod{background:var(--paper);border:1px solid var(--border);border-radius:14px;padding:15px 16px}
  .wk-h{font-family:'Quicksand';font-weight:800;font-size:15px;color:var(--brand);display:flex;align-items:center;gap:8px;margin-bottom:4px}
  .wk-ct{font-family:'JetBrains Mono';font-size:10px;font-weight:800;color:var(--accent-deep);background:var(--accent-pale);padding:1px 8px;border-radius:20px}

  /* ===== turnkey 'auto-produce' teaser ===== */
  .produce-teaser{display:flex;gap:12px;align-items:flex-start;background:linear-gradient(120deg,var(--brand-light),var(--accent-pale));border:1px dashed var(--brand-mid);border-radius:12px;padding:13px 15px;margin-top:12px}

  .soon-pill{font-family:'JetBrains Mono';font-size:8px;font-weight:800;letter-spacing:.08em;color:var(--brand);background:#fff;border:1px solid var(--brand-mid);padding:2px 7px;border-radius:20px;margin-left:8px;vertical-align:middle}
  .produce-teaser .pt-sub{font-size:11.5px;color:var(--ink-soft);line-height:1.45;margin-top:4px}
  /* phone shot list */
  .phone-row{display:flex;gap:11px;overflow-x:auto;padding-bottom:6px}
  .phone{min-width:174px;width:174px;height:304px;background:var(--ink);border-radius:20px;padding:6px;flex-shrink:0;position:relative}
  .phone-screen{background:linear-gradient(165deg,var(--brand-light),#fff);border-radius:15px;height:100%;padding:11px 11px 10px;display:flex;flex-direction:column}
  .phone-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .phone-scene{font-family:'JetBrains Mono';font-size:8.5px;color:var(--brand);font-weight:800;letter-spacing:.06em}
  .phone-sec{font-family:'JetBrains Mono';font-size:8px;color:var(--ink-soft);font-weight:700;background:var(--cream-deep);padding:1px 6px;border-radius:20px}
  .phone-do{font-size:11px;line-height:1.42;color:var(--ink);font-weight:600}

  .phone-osd .osl{display:block;font-family:'JetBrains Mono';font-size:7px;letter-spacing:.1em;opacity:.7;margin-bottom:2px;font-weight:800}
  .phone-cap{margin-top:auto;padding-top:8px;font-size:8px;color:var(--ink-soft);line-height:1.3;font-family:'JetBrains Mono'}
  .words-sub{font-family:'JetBrains Mono';font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);font-weight:700;margin-bottom:7px}
  .panel-head{display:flex;gap:10px;align-items:center;justify-content:space-between;margin-bottom:11px;flex-wrap:wrap}
  .panel-note{font-size:11.5px;color:var(--ink-soft);font-style:italic;font-family:'Fraunces';line-height:1.4;flex:1;min-width:170px}
  .panel-run{background:var(--brand);color:#fff;border:none;font-family:'JetBrains Mono';font-size:10px;font-weight:800;letter-spacing:.04em;padding:7px 12px;border-radius:20px;cursor:pointer;white-space:nowrap}
  .panel-run:disabled{opacity:.55;cursor:default}
  .panel-live-badge{font-family:'JetBrains Mono';font-size:8px;font-weight:800;letter-spacing:.08em;color:var(--green);background:#F3FAF0;border:1px solid var(--green);padding:3px 8px;border-radius:20px}
  .panel-share{margin-left:auto;font-family:'JetBrains Mono';font-size:8px;color:var(--ink-soft);font-weight:700}
  /* panel */
  .panel-react{background:var(--paper);border:1px solid var(--border);border-radius:12px;padding:11px 13px;margin-bottom:8px;display:flex;gap:11px;align-items:flex-start}

  .panel-score{margin-left:auto;font-family:'JetBrains Mono';font-size:11px;font-weight:800;padding:2px 8px;border-radius:20px}
  .panel-line{font-size:12px;color:var(--ink-soft);font-style:italic;font-family:'Fraunces';line-height:1.4;margin-top:2px}
  details.acc{background:var(--paper);border:1px solid var(--border);border-radius:12px;margin-bottom:9px;overflow:hidden}

  .acc-body{padding:12px 14px;font-size:12.5px;line-height:1.55;color:var(--ink-soft)}
  .chev{margin-left:auto;transition:.2s}
  details.acc[open] .chev{transform:rotate(180deg)}

  /* Performance chart */
  .perf-card{background:var(--paper);border:1px solid var(--border);border-radius:var(--r);padding:22px 24px;box-shadow:var(--shadow);margin-bottom:16px}
  .perf-card h3{font-size:19px;margin:0 0 3px;color:var(--brand)}
  .perf-card .sub{font-family:'Fraunces';font-style:italic;color:var(--ink-soft);font-size:13.5px;margin-bottom:18px}
  .bar-row{display:flex;align-items:center;gap:12px;margin-bottom:9px}
  .bar-label{width:190px;font-size:11.5px;font-weight:700;text-align:right;flex-shrink:0;line-height:1.25}
  .bar-track{flex:1;height:22px;background:var(--cream);border-radius:6px;overflow:hidden}
  .bar-fill{height:100%;border-radius:0 6px 6px 0;min-width:4px}
  .bar-val{width:52px;flex-shrink:0;font-family:'JetBrains Mono';font-size:11.5px;font-weight:800;white-space:nowrap;text-align:left}
  .perf-legend{display:flex;gap:20px;margin:16px 0 4px;font-size:12px;font-weight:700}
  .perf-legend span{display:flex;align-items:center;gap:6px}
  .sw{width:13px;height:13px;border-radius:4px}
  .perf-punch{background:var(--brand-light);border-left:4px solid var(--brand);border-radius:10px;padding:12px 14px;font-size:13px;line-height:1.5;margin-top:16px}
  .funnel{display:flex;align-items:center;gap:10px;margin:18px 0 4px;flex-wrap:wrap}
  .fstep{flex:1;min-width:130px;background:var(--cream);border:1px solid var(--border);border-radius:14px;padding:16px 12px;text-align:center}
  .fstep .fnum{font-family:'Quicksand';font-weight:900;font-size:27px;line-height:1}
  .fstep .flbl{font-size:11.5px;color:var(--ink-soft);margin-top:5px;line-height:1.3}
  .farrow{font-family:'JetBrains Mono';font-size:15px;color:var(--ink-soft);flex-shrink:0}
  @media(max-width:600px){.funnel{flex-direction:column}.farrow{transform:rotate(90deg)}}

  /* Milestone Map */
  .mm-bands{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
  .mm-band{flex:1;min-width:130px;background:var(--paper);border:2px solid var(--border);border-radius:14px;padding:12px;cursor:pointer;transition:.15s;text-align:center}
  .mm-band:hover{border-color:var(--brand-mid)}
  .mm-band.on{border-color:var(--brand);background:var(--brand-light)}
  .mm-band .age{font-family:'Quicksand';font-weight:900;font-size:17px;color:var(--brand)}
  .mm-band .lbl{font-size:10.5px;color:var(--ink-soft);font-weight:700;margin-top:2px}
  .mm-detail{background:var(--paper);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
  .mm-flow{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border)}
  .mm-step{background:var(--paper);padding:16px}
  .mm-step:last-child{background:var(--brand-light)}
  .mm-step .mstage{font-family:'JetBrains Mono';font-size:9px;letter-spacing:.1em;color:var(--ink-soft);font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px}
  .mm-step h4{font-size:14px;margin:0 0 6px;color:var(--brand)}
  .mm-step p{font-size:12px;color:var(--ink-soft);line-height:1.5;margin:0}
  .mm-cta{padding:14px 18px;background:var(--brand-deep);color:#fff;font-size:12.5px;display:flex;align-items:center;gap:10px}

  /* how it works */
  .flow-rail{display:flex;align-items:center;gap:0;margin:20px 0;overflow-x:auto;padding-bottom:6px}
  .flow-node{width:40px;height:40px;border-radius:50%;display:grid;place-items:center;font-size:16px;flex-shrink:0;cursor:pointer;border:2px solid var(--border);background:var(--paper);transition:.25s}
  .flow-node.done{background:var(--brand);border-color:var(--brand);color:#fff}
  .flow-node.active{background:var(--accent);border-color:var(--accent-deep);transform:scale(1.18);box-shadow:0 0 0 5px rgba(246,217,59,.3)}
  .flow-line{height:3px;width:26px;background:var(--border);flex-shrink:0}
  .flow-line.fill{background:var(--brand)}
  .flow-card{background:var(--paper);border:1px solid var(--border);border-radius:16px;padding:18px 20px;box-shadow:var(--shadow)}
  .fc-agent{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .fc-agent .g{width:40px;height:40px;border-radius:12px;background:var(--brand-light);display:grid;place-items:center;font-size:18px}
  .watch-chips{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0}
  .watch-chip{font-size:10px;background:var(--cream);border:1px solid var(--border);padding:3px 9px;border-radius:20px;font-family:'JetBrains Mono';color:var(--ink-soft)}
  .verdict{background:#F1FAF0;border:1px solid #BFE3CD;border-radius:11px;padding:11px 13px;font-size:12.5px;margin-top:12px;line-height:1.5}
  .incoming{font-size:10px;font-family:'JetBrains Mono';color:var(--ink-soft);background:var(--cream);padding:3px 9px;border-radius:20px;display:inline-block;margin-bottom:8px}
  .step-band{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin:18px 0}
  .step-cell{background:var(--paper);padding:16px}
  .step-cell.you{background:var(--brand-deep);color:#fff}
  .step-num{font-family:'JetBrains Mono';font-size:11px;color:var(--ink-soft);border-bottom:1px dashed var(--border);padding-bottom:5px;margin-bottom:8px}
  .step-cell.you .step-num{color:#C9BEE8;border-color:rgba(255,255,255,.2)}
  .step-cell h4{font-size:15px;margin:0 0 5px;color:var(--brand)}
  .step-cell.you h4{color:#fff}
  .step-cell p{font-size:11.5px;color:var(--ink-soft);margin:0;line-height:1.45}
  .step-cell.you p{color:#E4DBF7}

  .wip-banner{background:repeating-linear-gradient(45deg,var(--accent-pale),var(--accent-pale) 10px,#FBF0C4 10px,#FBF0C4 20px);border:1.5px dashed var(--accent-deep);border-radius:14px;padding:16px 18px;margin-bottom:16px}
  .wip-banner .tag{font-family:'JetBrains Mono';font-size:9.5px;font-weight:800;letter-spacing:.1em;color:var(--brand);background:#fff;padding:3px 9px;border-radius:20px;display:inline-block;margin-bottom:8px}
  .wip-banner p{margin:0;font-size:12.5px;line-height:1.5;color:var(--ink-soft)}
  .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:16px 0}
  .kpi{background:var(--paper);border:1px solid var(--border);border-radius:14px;padding:18px;position:relative;overflow:hidden;text-align:center}
  .kpi .soon{position:absolute;inset:0;display:grid;place-items:center;font-family:'Quicksand';font-size:34px;font-weight:900;color:rgba(74,30,158,.06)}
  .kpi .kv{font-family:'Quicksand';font-size:26px;font-weight:900;color:var(--ink-soft);position:relative}
  .kpi .kl{font-size:10.5px;color:var(--ink-soft);position:relative;margin-top:3px}
  .foot{text-align:center;padding:30px;font-family:'JetBrains Mono';font-size:10px;color:var(--ink-soft);margin-top:20px}
  .decision-row{display:flex;gap:12px;align-items:flex-start;background:var(--paper);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px}
  .dverb{font-size:9.5px;font-weight:800;padding:3px 9px;border-radius:20px;font-family:'JetBrains Mono';white-space:nowrap;height:fit-content}
  .d-prom{background:#E7F5EC;color:#2E8B57}.d-kill{background:#FDECEA;color:#C0392B}.d-queue{background:var(--brand-light);color:var(--brand)}.d-esc{background:#FDF3DA;color:#B9791B}

  .amb-card{background:var(--paper);border:1px solid var(--border);border-radius:14px;padding:14px;box-shadow:var(--shadow);display:flex;flex-direction:column;position:relative;overflow:hidden}
  .amb-card .rail{position:absolute;left:0;top:0;bottom:0;width:5px}
  .amb-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .amb-av{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--brand),var(--teal));display:grid;place-items:center;color:#fff;font-family:'Quicksand';font-weight:900;font-size:15px}
  .amb-handle{font-weight:800;font-size:13px}
  .amb-name{font-size:11px;color:var(--ink-soft)}
  .status-pill{font-size:9px;font-weight:800;padding:2px 8px;border-radius:20px;font-family:'JetBrains Mono';margin-left:auto}
  .st-watch{background:var(--accent-pale);color:var(--accent-deep)}

  .studio-teaser{background:linear-gradient(135deg,var(--brand-deep),var(--brand));border-radius:20px;padding:34px;color:#fff;text-align:center}
  .studio-teaser h2{font-size:26px;margin:12px 0 8px;font-weight:900}
  .studio-teaser p{font-size:13.5px;color:#E4DBF7;max-width:520px;margin:0 auto 18px;line-height:1.55}
  .st-cards{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;max-width:560px;margin:0 auto}
  .st-c{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:12px;padding:12px 14px;text-align:left;font-size:12.5px}
  .st-c .stq{font-family:'Fraunces';font-style:italic}
  /* Studio chat */
  .studio{display:flex;flex-direction:column;height:calc(100vh - 176px);min-height:440px;background:var(--paper);border:1px solid var(--border);border-radius:18px;overflow:hidden}
  .st-ctx{background:linear-gradient(120deg,var(--brand-deep),var(--brand));color:#fff;padding:10px 16px;display:flex;align-items:center;gap:11px;font-size:12.5px}
  .st-ctx .stx-lbl{font-family:'JetBrains Mono';font-size:8.5px;letter-spacing:.1em;opacity:.85;text-transform:uppercase;white-space:nowrap}
  .st-ctx b{font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .st-ctx .stx-x{margin-left:auto;background:rgba(255,255,255,.2);border:none;color:#fff;width:22px;height:22px;border-radius:50%;cursor:pointer;font-size:14px;line-height:1;flex-shrink:0}
  .st-scroll{flex:1;overflow-y:auto;padding:22px}
  .st-empty{max-width:580px;margin:5vh auto 0;text-align:center}
  .st-empty h2{font-size:24px;font-weight:900;margin:10px 0 6px}
  .st-empty p{font-size:13px;color:var(--ink-soft);line-height:1.55;margin:0 auto 20px;max-width:470px}
  .st-sugg{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:580px;margin:0 auto}
  .st-sg{background:#fff;border:1px solid var(--border);border-radius:12px;padding:12px 13px;text-align:left;cursor:pointer;font-size:12.5px;line-height:1.4;color:var(--ink);transition:.12s}
  .st-sg:hover{border-color:var(--brand);background:var(--brand-light)}
  .st-sg .sgl{display:block;font-family:'JetBrains Mono';font-size:8px;letter-spacing:.08em;color:var(--brand);margin-bottom:4px;font-weight:800}
  .msg{display:flex;gap:10px;margin-bottom:16px;max-width:780px}
  .msg.user{margin-left:auto;flex-direction:row-reverse}
  .msg-av{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;font-size:15px;flex-shrink:0}
  .msg.user .msg-av{background:var(--purple);color:#fff}
  .msg.bot .msg-av{background:var(--brand);color:#fff}
  .msg-bub{border-radius:14px;padding:11px 15px;font-size:13.5px;line-height:1.6}
  .msg.user .msg-bub{background:var(--purple);color:#fff}
  .msg.bot .msg-bub{background:#fff;border:1px solid var(--border);color:var(--ink)}
  .msg-bub p{margin:0 0 9px} .msg-bub p:last-child{margin-bottom:0}
  .msg-bub h3{font-size:14.5px;font-weight:800;margin:12px 0 6px} .msg-bub h3:first-child{margin-top:0}
  .msg-bub h4{font-size:13px;font-weight:800;margin:10px 0 5px}
  .msg-bub ul,.msg-bub ol{margin:4px 0 9px;padding-left:20px} .msg-bub li{margin-bottom:4px}
  .msg-bub code{background:var(--cream-deep);padding:1px 5px;border-radius:5px;font-size:12px;font-family:'JetBrains Mono'}
  .msg-bub blockquote{border-left:3px solid var(--brand);margin:6px 0;padding:2px 0 2px 12px;color:var(--ink-soft);font-style:italic}
  .msg-bub hr{border:none;border-top:1px solid var(--border);margin:10px 0}
  .msg-bub a{color:var(--brand);font-weight:700}
  .blink::after{content:'▍';animation:bl 1s steps(1) infinite;color:var(--brand);margin-left:1px}

class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={err:false};}
  static getDerivedStateFromError(){return{err:true};}
  render(){if(this.state.err)return(<div style={{padding:40,fontFamily:'Nunito'}}><h2>The engine hit a snag.</h2><p>Refresh to reload the Compostic engine.</p></div>);return this.props.children;}
}

function PerfChart(){
  const bar=(rows,color)=>rows.map(([lbl,val],i)=>(
    <div className="bar-row" key={i}>
      <div className="bar-label">{lbl}</div>
      <div className="bar-track"><div className="bar-fill" style={{width:Math.max(0.4,(val/PERF_MAX)*100)+"%",background:color}}></div></div>
      <div className="bar-val" style={{color}}>{fmt(val)}</div>
    </div>
  ));
  return (
    <div className="perf-card">
      <h3>Your best content isn’t yours</h3>
      <div className="sub">In this category, other people’s posts beat the brand’s own — by a lot. (Observed engagement, @compostic.co.)</div>

// ---- lightweight markdown → React (ported OBSOLETE renderer) ----
function stInline(t){
  const nodes=[]; let key=0, last=0, m;
  const re=/(\*\*([^*]+)\*\*)|(\*([^*]+)\*)|(`([^`]+)`)|(\[([^\]]+)\]\(([^)]+)\))/g;
  while((m=re.exec(t))){
    if(m.index>last) nodes.push(t.slice(last,m.index));
    if(m[1]) nodes.push(<strong key={key++}>{m[2]}</strong>);
    else if(m[3]) nodes.push(<em key={key++}>{m[4]}</em>);
    else if(m[5]) nodes.push(<code key={key++}>{m[6]}</code>);
    else if(m[7]) nodes.push(<a key={key++} href={m[9]} target="_blank" rel="noopener noreferrer">{m[8]}</a>);
    last=re.lastIndex;
  }
  if(last<t.length) nodes.push(t.slice(last));
  return nodes;
}
function renderMarkdown(md){
  const lines=(md||"").split("\n"), out=[]; let i=0,key=0,list=null,lt=null;
  const flush=()=>{ if(list){ out.push(lt==="ol"?<ol key={key++}>{list}</ol>:<ul key={key++}>{list}</ul>); list=null; } };
  const special=s=>/^(#{1,3}\s|>\s?|\s*[-*]\s|\s*\d+\.\s|\s*(---|\*\*\*)\s*$)/.test(s);
  while(i<lines.length){
    const ln=lines[i];
    if(/^\s*$/.test(ln)){ flush(); i++; continue; }
    if(/^###\s+/.test(ln)){ flush(); out.push(<h4 key={key++}>{stInline(ln.replace(/^###\s+/,''))}</h4>); i++; continue; }
    if(/^#{1,2}\s+/.test(ln)){ flush(); out.push(<h3 key={key++}>{stInline(ln.replace(/^#{1,2}\s+/,''))}</h3>); i++; continue; }
    if(/^\s*(---|\*\*\*)\s*$/.test(ln)){ flush(); out.push(<hr key={key++}/>); i++; continue; }
    if(/^\s*>\s?/.test(ln)){ flush(); out.push(<blockquote key={key++}>{stInline(ln.replace(/^\s*>\s?/,''))}</blockquote>); i++; continue; }
    const om=ln.match(/^\s*\d+\.\s+(.*)/);
    if(om){ if(lt!=="ol"){flush();lt="ol";} if(!list)list=[]; list.push(<li key={key++}>{stInline(om[1])}</li>); i++; continue; }
    const um=ln.match(/^\s*[-*]\s+(.*)/);
    if(um){ if(lt!=="ul"){flush();lt="ul";} if(!list)list=[]; list.push(<li key={key++}>{stInline(um[1])}</li>); i++; continue; }
    flush(); const para=[ln]; i++;
    while(i<lines.length && !/^\s*$/.test(lines[i]) && !special(lines[i])){ para.push(lines[i]); i++; }
    out.push(<p key={key++}>{stInline(para.join(" "))}</p>);
  }
  flush();
  return out;
}

function Studio({seed,onClearSeed}){
  const [msgs,setMsgs]=useState([]);
  const [input,setInput]=useState("");
  const [busy,setBusy]=useState(false);
  const [err,setErr]=useState("");
  const scroll=useRef(null);
  useEffect(()=>{ if(scroll.current) scroll.current.scrollTop=scroll.current.scrollHeight; },[msgs,err]);
  const ctxLabel = seed ? (seed.type==="brief" ? seed.brief.concept : seed.text) : null;
  const sugg = seed ? (seed.type==="brief"?SUGG_BRIEF:SUGG_SIGNAL) : SUGG_DEFAULT;
  async function send(text){
    const q=(text!=null?text:input).trim(); if(!q||busy) return;
    setInput(""); setErr("");
    const base=[...msgs,{role:"user",content:q}];
    setMsgs([...base,{role:"assistant",content:""}]); setBusy(true);
    try{
      const res=await fetch("/api/studio",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({messages:base,seed})});
      if(!res.ok||!res.body) throw new Error("api");
      const rd=res.body.getReader(),dec=new TextDecoder(); let acc="";
      for(;;){ const {done,value}=await rd.read(); if(done) break; acc+=dec.decode(value,{stream:true}); setMsgs(m=>{const c=m.slice();c[c.length-1]={role:"assistant",content:acc};return c;}); }
      if(!acc.trim()) throw new Error("empty");
    }catch(e){
      setMsgs(m=>m.slice(0,-1));
      setErr("The Strategist goes live the moment this is deployed to Vercel with your ANTHROPIC_API_KEY. Running locally there’s no server to answer — but the flow, the context, and the whole engine brain are wired and ready.");
    }finally{ setBusy(false); }
  }
  function onKey(e){ if(e.key==="Enter"&&!e.shiftKey){ e.preventDefault(); send(); } }
  return (
    <div className="wrap"><div className="studio">
      {seed&&<div className="st-ctx"><span className="stx-lbl">{seed.type==="brief"?"✦ Sharpening brief":"✦ Riding signal"}</span><b>{ctxLabel}</b><button className="stx-x" onClick={onClearSeed} title="clear context">×</button></div>}
      <div className="st-scroll" ref={scroll}>
        {msgs.length===0 && (
          <div className="st-empty">
            <div style={{fontSize:34}}>🧠</div>
            <h2>The Strategist</h2>
            <p>Loaded with the full Compostic engine — the dry voice, the four pillars, Wormsley &amp; Cling, and the swap panel. Ask for scripts, hooks, bits, or a gut-check.{seed?" It already has this "+(seed.type==="brief"?"brief":"signal")+" in context — just ask.":""}</p>
            <div className="st-sugg">{sugg.map((s,i)=>(<button className="st-sg" key={i} onClick={()=>send(s.q)}><span className="sgl">{s.l}</span>{s.q}</button>))}</div>
          </div>
        )}
        {msgs.map((m,i)=>(
          <div className={"msg "+(m.role==="user"?"user":"bot")} key={i}>
            <div className="msg-av">{m.role==="user"?"🌱":"🧠"}</div>
            <div className="msg-bub">{m.role==="user"?m.content:(m.content?<>{renderMarkdown(m.content)}{busy&&i===msgs.length-1&&<span className="blink"></span>}</>:<span className="blink"></span>)}</div>
          </div>
        ))}
        {err&&<div className="st-err">{err}</div>}
      </div>
      <div className="st-inputbar">
        <textarea className="st-input" rows={1} value={input} placeholder="Ask the Strategist anything…" onChange={e=>setInput(e.target.value)} onKeyDown={onKey} disabled={busy}/>
        <button className="st-send" onClick={()=>send()} disabled={busy||!input.trim()}>↑</button>
      </div>
    </div></div>
  );
}

      {memo&&<MondayMemo onClose={()=>setMemo(false)} onGo={()=>{setMemo(false);setNav("intel");}}/>}
      {brief&&<BriefModal b={brief} onClose={()=>setBrief(null)} onStudio={(bb)=>{setStudioSeed({type:'brief',brief:bb});setBrief(null);setNav("studio");}} onIntel={(t)=>{setBrief(null);setNav("intel");setIntelFocus(t);}}/>}
      {diag&&<DiagnosticInbox onClose={()=>setDiag(false)}/>}
      <div className="app">
        <div className="side">
          <div className="logo"><div className="logo-blocks"><div className="blk" style={{background:'var(--brand)',color:'#fff'}}>🪱</div><div className="blk" style={{background:'var(--teal)',color:'#fff'}}>🧾</div><div className="blk" style={{background:'var(--orange)',color:'#fff'}}>🥪</div></div><div className="logo-name">COMPOSTIC</div><div className="logo-sub">gone in weeks, not centuries</div></div>
          {NAV.map(n=>(<button key={n[0]} title={NAV_DESC[n[0]]} className={"nav-item"+(nav===n[0]?" on":"")} onClick={()=>setNav(n[0])}><span className="ico">{n[2]}</span>{n[1]}{n[3]==="new"&&<span className="nav-new">NEW</span>}{n[3]==="wip"&&<span className="nav-wip">WIP</span>}</button>))}
          <div className="side-spacer"></div>
          <button className="howlink" onClick={()=>setNav("how")}>⚙ how it works</button>
          <Btn onClick={()=>setDiag(true)}>📮 Diagnostic Inbox <span className="nav-wip" style={{marginLeft:6}}>WIP</span></Btn>
        </div>
        <div className="main">
          <div className="page-head">
            <div><h1>{ {intel:"Intelligence Brief",briefs:"Content Briefs",map:"The Cast",studio:"Studio",how:"How It Works",cal:"Calendar",perf:"Performance"}[nav] }</h1>
              <p className="dek">{ {intel:"What’s moving in sustainable-home + plastic-free culture this week — and exactly how Compostic could ride each one.",briefs:"Ready-to-shoot content ideas, built from the signals on the left. Click any card to open the full brief.",map:"Wormsley vs Cling — the character duo, the content engine no competitor has.",studio:"Your always-on content strategist, loaded with the full engine context.",how:"One signal, start to finish — how a trend we spot becomes next week’s post.",cal:"A rolling content calendar (coming once we’re working together).",perf:"Reach, saves, and follower results (coming once we’re working together)."}[nav] }</p>
            </div>
            <div className="pill"><span className="live-dot"></span>Live · {WEEK}</div>
          </div>
          {!memo&&nav==="intel"&&(<div className="ticker"><div className="ticker-track">{[...TICKER,...TICKER].map((t,i)=>(<span key={i}><span className="tdot" style={{background:{signal:'var(--brand-mid)',pulse:'var(--coral)',decision:'var(--accent)',win:'var(--green)',warn:'var(--warn)'}[t[0]]}}></span>{t[1]}</span>))}</div></div>)}
          {nav==="intel"&&<IntelBrief focus={intelFocus} onFocusDone={()=>setIntelFocus(null)} onDrop={(txt)=>{setStudioSeed(txt?{type:'signal',text:txt}:null);setNav("studio");}} onOpen={setBrief}/>}
          {nav==="briefs"&&<ContentBriefs onOpen={setBrief}/>}
          {nav==="studio"&&<Studio seed={studioSeed} onClearSeed={()=>setStudioSeed(null)}/>}
          {nav==="how"&&<HowItWorks/>}
          {nav==="cal"&&<WIPTab kind="cal"/>}
          {nav==="perf"&&<WIPTab kind="perf"/>}
          <div className="foot"><b>Compostic Engine</b> · {WEEK} · built for Compostic · public-signal read · OBSOLETE V0.4</div>
        </div>
      </div>
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
</body>
</html>
